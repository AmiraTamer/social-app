   <!-- right side -->
            <aside class="hidden h-fit xl:sticky xl:top-21 xl:block">
                <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">

                    <div class="mb-3 flex items-center justify-between gap-2">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-users text-softBlue"></i>
                            <h3 class="text-base font-extrabold text-slate-900">Suggested Friends</h3>
                        </div>
                        <span class="rounded-full bg-slate-100 px-2 py-0.5 text-xs font-bold text-slate-600">{{sugFriendsArr.length}}</span>
                    </div>

                    <div class="mb-3">
                        <label class="relative block">
                            <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input placeholder="Search friends..."
                                class="w-full rounded-xl border border-slate-200 bg-slate-50 py-2 pl-9 pr-3 text-sm text-slate-700 outline-none focus:border-softBlue focus:bg-white"
                                value="">
                        </label>
                    </div>

                      <div class="space-y-3">
                    @for (friend of sugFriendsArr; track $index) {
                      
                        <div class="rounded-xl border border-slate-200 p-2.5">
                            <div class="flex items-center justify-between gap-2">
                                <button type="button"
                                    class="flex min-w-0 items-center gap-2 rounded-lg px-1 py-1 text-left transition hover:bg-slate-50">
                                    <img [alt]="" class="h-10 w-10 rounded-full object-cover"
                                        [src]="friend.photo">
                                    <div class="min-w-0">
                                        <p class="truncate text-sm font-bold text-slate-900 hover:underline">{{friend.name}}</p>
                                        <p class="truncate text-xs text-slate-500">@{{friend.username}}</p>
                                    </div>
                                </button>
                                <button
                                    class="inline-flex items-center gap-1 rounded-full px-3 py-1.5 text-xs font-bold transition disabled:opacity-60 bg-babyBlue text-softBlue hover:bg-[#d8ebff] cursor-pointer">
                                    <i class="fa-solid fa-user-plus"></i>
                                    Follow
                                </button>
                            </div>

                            <div class="mt-2 flex items-center gap-2 text-[11px] font-semibold text-slate-500">
                                <span class="rounded-full bg-slate-100 px-2 py-0.5">{{friend.followersCount}} followers</span>
                                @if (friend.mutualFollowersCount > 0) {
                                    <span class="rounded-full bg-[#edf4ff] px-2 py-0.5 text-softBlue"> {{friend.mutualFollowersCount}} mutual</span>
                                }
                            </div>

                            

                        </div>
                    }
                    </div>
                    <button
                        class="mt-3 inline-flex w-full items-center justify-center gap-2 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-100 cursor-pointer">
                        View more
                    </button>
                </div>
            </aside>
