<section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm sm:p-6">
    <div class="mb-5 flex items-center gap-3">
        <span
            class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-babyBlue text-softBlue">
        <i class="fa-solid fa-key"></i>
        </span>
        <div>
            <h1 class="text-xl font-extrabold text-slate-900 sm:text-2xl">Change Password</h1>
            <p class="text-sm text-slate-500">Keep your account secure by using a strong password.</p>
        </div>
    </div>
    <form novalidate="" class="space-y-4"><label class="block"><span
                class="mb-1.5 block text-sm font-bold text-slate-700">Current password</span><input
                placeholder="Enter current password"
                class="w-full rounded-xl border bg-slate-50 px-3 py-2.5 text-sm text-slate-800 outline-none transition border-slate-200 focus:border-softBlue focus:bg-white"
                type="password" value="" name="currentPassword"></label><label class="block"><span
                class="mb-1.5 block text-sm font-bold text-slate-700">New password</span><input
                placeholder="Enter new password"
                class="w-full rounded-xl border bg-slate-50 px-3 py-2.5 text-sm text-slate-800 outline-none transition border-slate-200 focus:border-softBlue focus:bg-white"
                type="password" value="" name="newPassword"><span class="mt-1 block text-xs text-slate-500">At least 8
                characters with uppercase, lowercase, number, and special character.</span></label><label
            class="block"><span class="mb-1.5 block text-sm font-bold text-slate-700">Confirm new password</span><input
                placeholder="Re-enter new password"
                class="w-full rounded-xl border bg-slate-50 px-3 py-2.5 text-sm text-slate-800 outline-none transition border-slate-200 focus:border-softBlue focus:bg-white"
                type="password" value="" name="confirmPassword"></label>
        <div
            class="rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm font-semibold text-emerald-700">
            Password changed successfully.</div><button type="submit"
            class="inline-flex w-full items-center justify-center rounded-xl bg-softBlue px-4 py-2.5 text-sm font-bold text-white transition hover:bg-[#166fe5] disabled:cursor-not-allowed disabled:opacity-60"
            disabled="">Update password</button>
    </form>
</section>
