@if (myData) {
    <div class="mx-auto max-w-7xl px-3 py-3.5">
    <main class="min-w-0">
        <div class="space-y-5 sm:space-y-6">
            <section
                class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-[0_2px_10px_rgba(15,23,42,.06)] sm:rounded-[28px]">
                <div
                    class="group/cover relative h-44 bg-[linear-gradient(112deg,#0f172a_0%,#1e3a5f_36%,#2b5178_72%,#5f8fb8_100%)] sm:h-52 lg:h-60">
                    <div
                        class="absolute inset-0 bg-[radial-gradient(circle_at_20%_24%,rgba(255,255,255,.14)_0%,rgba(255,255,255,0)_36%)]">
                    </div>
                    <div
                        class="absolute inset-0 bg-[radial-gradient(circle_at_86%_12%,rgba(186,230,253,.22)_0%,rgba(186,230,253,0)_44%)]">
                    </div>
                    <div class="absolute -left-16 top-10 h-36 w-36 rounded-full bg-white/8 blur-3xl"></div>
                    <div class="absolute right-8 top-6 h-48 w-48 rounded-full bg-[#c7e6ff]/10 blur-3xl"></div>
                    <div class="absolute inset-x-0 bottom-0 h-20 bg-linear-to-t from-black/25 to-transparent"></div>
                    <div
                        class="pointer-events-none absolute right-2 top-2 z-10 flex max-w-[90%] flex-wrap items-center justify-end gap-1.5 opacity-100 transition duration-200 sm:right-3 sm:top-3 sm:max-w-none sm:gap-2 sm:opacity-0 sm:group-hover/cover:opacity-100 sm:group-focus-within/cover:opacity-100">
                        <label
                            class="pointer-events-auto inline-flex cursor-pointer items-center gap-1 rounded-lg bg-black/45 px-2 py-1 text-[11px] font-bold text-white backdrop-blur transition hover:bg-black/60 sm:gap-1.5 sm:px-3 sm:py-1.5 sm:text-xs">
                            <i class="fa-solid fa-camera"></i>
                            Add cover<input accept="image/*" class="hidden" type="file"></label>
                    </div>
                </div>
                <div class="relative -mt-12 px-3 pb-5 sm:-mt-16 sm:px-8 sm:pb-6">
                    <div class="rounded-3xl border border-white/60 bg-white/92 p-5  backdrop-blur-xl sm:p-7">
                        <div class="flex flex-col gap-6 lg:flex-row lg:items-end lg:justify-between">
                            <div class="min-w-0">
                                <div class="flex items-end gap-4">
                                    <div class="group/avatar relative shrink-0">
                                        <button type="button"
                                            class="cursor-zoom-in rounded-full">
                                            <img [alt]="myData.name"
                                                class="h-28 w-28 rounded-full border-4 border-white object-cover shadow-md ring-2 ring-[#dbeafe]"
                                                [src]="myData.photo">
                                        </button>
                                        <button type="button"
                                            class="absolute bottom-1 left-1 flex h-9 w-9 cursor-pointer items-center justify-center rounded-full bg-white text-softBlue opacity-100 shadow-sm ring-1 ring-slate-200 transition duration-200 hover:bg-slate-50 sm:opacity-0 sm:group-hover/avatar:opacity-100 sm:group-focus-within/avatar:opacity-100"
                                            title="View profile photo" aria-label="View profile photo">
                                            <i class="fa-solid fa-maximize"></i> </button>
                                        <label
                                            class="absolute bottom-1 right-1 flex h-9 w-9 cursor-pointer items-center justify-center rounded-full bg-softBlue text-white opacity-100 shadow-sm transition duration-200 hover:bg-[#166fe5] sm:opacity-0 sm:group-hover/avatar:opacity-100 sm:group-focus-within/avatar:opacity-100">
                                            <i class="fa-regular fa-camera"></i>
                                            <input accept="image/*" class="hidden" type="file">
                                        </label>
                                    </div>

                                    <div class="min-w-0 pb-1">
                                        <h2
                                            class="truncate text-2xl font-black tracking-tight text-slate-900 sm:text-4xl">
                                           {{myData.name}}</h2>
                                        <p class="mt-1 text-lg font-semibold text-slate-500 sm:text-xl">@{{myData.username}} </p>
                                        <div
                                            class="mt-3 inline-flex items-center gap-2 rounded-full border border-[#d7e7ff] bg-[#eef6ff] px-3 py-1 text-xs font-bold text-[#0b57d0]">
                                            <i class="fa-solid fa-users"></i>
                                            Route Posts member
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="grid w-full grid-cols-3 gap-2 lg:w-130">
                                <div
                                    class="rounded-2xl border border-slate-200 bg-white px-3 py-3 text-center sm:px-4 sm:py-4">
                                    <p class="text-[11px] font-bold uppercase tracking-wide text-slate-500 sm:text-xs">
                                        Followers</p>
                                    <p class="mt-1 text-2xl font-black text-slate-900 sm:text-3xl"> {{myData.followers}} </p>
                                </div>
                                <div
                                    class="rounded-2xl border border-slate-200 bg-white px-3 py-3 text-center sm:px-4 sm:py-4">
                                    <p class="text-[11px] font-bold uppercase tracking-wide text-slate-500 sm:text-xs">
                                        Following</p>
                                    <p class="mt-1 text-2xl font-black text-slate-900 sm:text-3xl">  {{myData.followingCount}}</p>
                                </div>
                                <div
                                    class="rounded-2xl border border-slate-200 bg-white px-3 py-3 text-center sm:px-4 sm:py-4">
                                    <p class="text-[11px] font-bold uppercase tracking-wide text-slate-500 sm:text-xs">
                                        Bookmarks</p>
                                    <p class="mt-1 text-2xl font-black text-slate-900 sm:text-3xl">{{myData.bookmarksCount}} </p>
                                </div>
                            </div>
                        </div>
                        <div class="mt-5 grid gap-4 lg:grid-cols-[1.3fr_.7fr]">
                            <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                                <h3 class="text-sm font-extrabold text-slate-800">About</h3>
                                <div class="mt-3 space-y-2 text-sm text-slate-600">
                                    <p class="flex items-center gap-2">
                                        <i class="fa-regular fa-envelope"></i>
                                        {{myData.email}}
                                    </p>
                                    <p class="flex items-center gap-2">
                                        <i class="fa-solid fa-users"></i>
                                        Active on Route Posts
                                    </p>
                                </div>
                            </div>
                            <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-1">
                                <div class="rounded-2xl border border-[#dbeafe] bg-[#f6faff] px-4 py-3">
                                    <p class="text-xs font-bold uppercase tracking-wide text-[#1f4f96]">My posts</p>
                                    <p class="mt-1 text-2xl font-black text-slate-900">2</p>
                                </div>
                                <div class="rounded-2xl border border-[#dbeafe] bg-[#f6faff] px-4 py-3">
                                    <p class="text-xs font-bold uppercase tracking-wide text-[#1f4f96]">Saved posts</p>
                                    <p class="mt-1 text-2xl font-black text-slate-900">0</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <section class="space-y-4">
                <div
                    class="flex flex-wrap items-center justify-between gap-2 rounded-2xl border border-slate-200 bg-white p-3 shadow-sm">
                    <div
                        class="grid w-full grid-cols-2 gap-2 rounded-xl bg-slate-100 p-1.5 sm:inline-flex sm:w-auto sm:gap-0">
                        <button
                        routerLink="myPosts" routerLinkActive="bg-white text-softBlue shadow-sm"
                            class="inline-flex items-center justify-center gap-2 rounded-sm px-4 py-2 text-sm font-bold transition">
                            <i class="fa-regular fa-file-text"></i>
                            My Posts
                        </button>
                        <!--  bg-white text-softBlue shadow-sm -->
                            <button
                            routerLink="saved" routerLinkActive="bg-white text-softBlue shadow-sm"
                            class="inline-flex items-center justify-center gap-2 rounded-sm px-4 py-2 text-sm font-bold transition">
                            <i class="fa-regular fa-bookmark"></i>
                            Saved</button>
                    </div>
                    <span class="rounded-full bg-babyBlue px-3 py-1 text-xs font-bold text-softBlue">2</span>
                </div>
               <router-outlet></router-outlet>
            </section>
        </div>
    </main>
</div>
}
