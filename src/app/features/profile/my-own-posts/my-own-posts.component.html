<div class="space-y-3">
    @for (post of myPosts; track $index) {
              <article
        class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-[0_1px_6px_rgba(15,23,42,.05)] transition hover:shadow-sm">
        <div class="p-4">
            <div class="flex flex-wrap items-center justify-between gap-2">
                <div class="flex min-w-0 items-center gap-2"><img [alt]="post.user.name"
                        [src]="post.user.photo"
                        class="h-10 w-10 rounded-full object-cover">
                    <div class="min-w-0">
                        <p class="truncate text-sm font-extrabold text-slate-900">{{post.user.name}}</p>
                        <p class="truncate text-xs font-semibold text-slate-500">@{{post.user.username}}</p>
                    </div>
                </div>
                <button
                [routerLink]="['/details' , post._id]"
                    class="rounded-md px-2 py-1 text-xs font-bold text-softBlue transition hover:bg-babyBlue">View
                    details</button>
            </div>
            <div class="pt-3">
                <p class="whitespace-pre-wrap text-[15px] leading-relaxed text-slate-800"> {{post.body}} </p>
            </div>
        </div>

          @if (post.image) {
         <div class="border-y border-slate-200 bg-slate-950/95">
            <button type="button"
                class="group relative flex w-full cursor-zoom-in items-center justify-center">
                <img alt="post"
                    [src]="post.image"
                    class="max-h-140 w-auto max-w-full object-contain">
                    <span
                    class="pointer-events-none absolute inset-0 bg-black/0 transition group-hover:bg-black/10">
                </span>
            </button>
        </div>
    }
        <div
            class="flex flex-col gap-2 border-t border-slate-200 px-4 py-3 text-sm text-slate-600 sm:flex-row sm:items-center sm:justify-between sm:gap-3">
            <div class="flex flex-wrap items-center gap-3 sm:gap-5"><span
                    class="inline-flex items-center gap-2 font-semibold"><i
                        class="text-softBlue fa-regular fa-thumbs-up"></i> {{post.likesCount}} likes</span><span
                    class="inline-flex items-center gap-2 font-semibold"><i
                        class="text-softBlue fa-solid fa-repeat"></i> {{post.sharesCount}} shares</span><span
                    class="inline-flex items-center gap-2 font-semibold"><i
                        class="text-softBlue fa-regular fa-comment"></i> {{post.commentsCount}} comments</span></div><span
                class="inline-flex items-center gap-1.5 text-xs font-bold text-slate-500">
                <i class="fa-regular fa-clock"></i>
                Mar 13, 9:50 AM</span>
        </div>
    </article>

        
      
      
    }
</div>
