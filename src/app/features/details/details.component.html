<div class="mx-auto max-w-7xl px-3 py-3.5">
    <main class="min-w-0">
        <div class="mx-auto max-w-3xl space-y-4">
            <button
            routerLink="/feed"
                class="inline-flex items-center gap-2 rounded-sm border border-slate-200 bg-white px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-50 cursor-pointer">
                <i class="fa-solid fa-arrow-left"></i>
                Back</button>

            <article class="overflow-visible rounded-xl border border-slate-200 bg-white shadow-sm">
            <div class="p-4">
                <div class="flex items-center gap-3">
                    <a class="shrink-0" href="#/profile" data-discover="true">
                        <img alt="username" class="h-11 w-11 rounded-full object-cover"
                            [src]="postDetails.user.photo"></a>
                    <div class="min-w-0 flex-1">
                        <a class="truncate text-sm font-bold text-foreground hover:underline" href="#/profile"
                            data-discover="true"> {{postDetails.user.name}} </a>

                        <div class="flex flex-wrap items-center gap-1 text-xs text-muted-foreground">
                            @{{postDetails.user.username}}
                            <button type="button"
                                class="rounded px-0.5 py-0.5 text-xs font-semibold text-slate-500 transition hover:bg-slate-100 hover:text-slate-700 hover:underline">
                                {{postDetails.createdAt}}
                            </button>
                            <span class="mx-1">·</span>
                            <div
                                class="p-0 w-fit items-center bg-neutral-secondary-strong text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body">
                                <select [disabled]="postDetails.user._id !== userId "
                                    class="border-none bg-transparent cursor-pointer ring-0 py-0 px-2 text-xs">
                                    <option [selected]="postDetails.privacy === 'public'" value="public"><i
                                            class="fa-solid fa-earth "></i> public</option>
                                    <option [selected]="postDetails.privacy === 'following'" value="following">followers
                                    </option>
                                    <option [selected]="postDetails.privacy === 'only_me'" value="only_me">only me</option>
                                </select>
                            </div>
                        </div>
                    </div>



                    <!-- post operations -->
                    <div class="relative group">
                        <button id="dropdownMenuIconButton" data-dropdown-toggle="dropdownDots"
                            class="text-heading bg-neutral-primary box-border border border-transparent hover:bg-neutral-secondary-medium focus:ring-4 focus:ring-neutral-tertiary font-medium leading-5 rounded-base text-sm p-2 focus:outline-none"
                            type="button">
                            <i class="fa-solid fa-ellipsis text-gray-600"></i>
                        </button>

                        <!-- Dropdown menu -->
                        <div id="dropdownDots"
                            class="z-30 hidden group-hover:block absolute bg-neutral-primary-medium border border-default-medium rounded-base shadow-lg w-44">
                            <ul class="p-2 text-sm text-body font-medium" aria-labelledby="dropdownMenuIconButton">
                                <li>
                                    <button
                                        class="inline-flex items-center w-full p-2 gap-x-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded cursor-pointer">
                                        <i class="fa-regular fa-bookmark"></i>
                                        Save Post
                                    </button>
                                    @if (postDetails.user._id === userId ) {

                                    <button
                                        class="inline-flex items-center w-full p-2 gap-x-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded cursor-pointer">
                                        <i class="fa-solid fa-pencil"></i>
                                        Edit post
                                    </button>
                                    <button 
                                        class="inline-flex text-red-700 items-center w-full p-2 gap-x-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded cursor-pointer">
                                        <i class="fa-regular fa-trash-can"></i>
                                        Delete post
                                    </button>

                                    }

                                </li>
                            </ul>
                        </div>
                    </div>


                </div>
                @if (postDetails.body) {
                <div class="mt-3">
                    <p class="whitespace-pre-wrap break-all text-sm leading-relaxed text-foreground">{{postDetails.body}}</p>
                </div>
                }
            </div>

            @if (postDetails.image) {
            <div class="max-h-155 overflow-hidden border-y border-slate-200">
                <button type="button" class="group relative block w-full cursor-zoom-in">
                    <img alt="post" class="w-full object-cover" [src]="postDetails.image">
                    <span
                        class="pointer-events-none absolute inset-0 bg-black/0 transition group-hover:bg-black/10"></span>
                </button>
            </div>
            }



            <div class="px-4 pb-2 pt-3 text-sm text-slate-500">
                <div class="flex flex-wrap items-center justify-between gap-2">
                    <div class="flex items-center gap-2">
                        <span class="flex h-5 w-5 items-center justify-center rounded-full bg-softBlue text-white">
                            <i class="fa-regular fa-thumbs-up  text-xs"></i>
                        </span>
                        <button type="button" class="font-semibold transition cursor-default">
                            {{postDetails.likesCount}} likes
                        </button>
                    </div>

                    <div class="flex flex-wrap items-center gap-2 text-xs sm:gap-3 sm:text-sm">
                        <span class="inline-flex items-center gap-1">
                            <i class="fa-solid fa-repeat text-xs"></i>
                            {{postDetails.sharesCount}} shares
                        </span>
                        <span> {{postDetails.commentsCount}} comments</span>
                        <button
                            class="rounded-md px-2 py-1 text-xs font-bold text-softBlue hover:bg-babyBlue cursor-pointer">
                            View details
                        </button>
                    </div>
                </div>
            </div>

            <div class="mx-4 border-t border-slate-200"></div>
            <div class="grid grid-cols-3 gap-1 p-1">

                <button
                    class="cursor-pointer flex items-center justify-center gap-1.5 rounded-md p-2 text-xs font-semibold transition-colors disabled:cursor-not-allowed disabled:opacity-50 sm:gap-2 sm:text-sm text-slate-600 hover:bg-slate-100">
                    <i class="fa-regular fa-thumbs-up  text-xl"></i>
                    <span>Like</span>
                </button>

                <button
                #el
                    class="cursor-pointer flex items-center justify-center gap-1.5 rounded-md p-2 text-xs font-semibold transition-colors disabled:cursor-not-allowed disabled:opacity-50 sm:gap-2 sm:text-sm text-slate-600 hover:bg-slate-100">
                    <i class="fa-regular fa-comment"></i>
                    <span>Comment</span>
                </button>

                <button
                    class="cursor-pointer flex items-center justify-center gap-1.5 rounded-md p-2 text-xs font-semibold transition-colors disabled:cursor-not-allowed disabled:opacity-50 sm:gap-2 sm:text-sm text-slate-600 hover:bg-slate-100">
                    <i class="fa-solid fa-share"></i>
                    <span>Share</span>
                </button>
            </div>

            @defer (on interaction(el)) {
                <app-comment-post [postId]="postDetails._id"></app-comment-post>
            }

        </article>





        </div>
    </main>
</div>
