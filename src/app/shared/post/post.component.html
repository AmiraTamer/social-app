<!-- Post -->
<article class="overflow-visible rounded-xl border border-slate-200 bg-white shadow-sm">
    <div class="p-4">
        <div class="flex items-center gap-3">
            <a class="shrink-0" href="#/profile" data-discover="true">
                <img alt="AmiraTamer" class="h-11 w-11 rounded-full object-cover" src="images\default-profile.png"></a>
            <div class="min-w-0 flex-1">
                <a class="truncate text-sm font-bold text-foreground hover:underline" href="#/profile"
                    data-discover="true">AmiraTamer</a>

                <div class="flex flex-wrap items-center gap-1 text-xs text-muted-foreground">@famyxo.
                    <button type="button"
                        class="rounded px-0.5 py-0.5 text-xs font-semibold text-slate-500 transition hover:bg-slate-100 hover:text-slate-700 hover:underline">
                        12s
                    </button>
                    <span class="mx-1">·</span>
                    <span class="relative inline-flex items-center">
                        <button type="button"
                            class="inline-flex cursor-pointer items-center gap-1 rounded-sm px-1 py-0.5 hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-60">
                            <i class="fa-solid fa-earth"></i>
                            Public

                        </button>
                    </span>
                </div>
            </div>

            <div class="relative">
                <button class="rounded-full p-1.5 text-slate-500 hover:bg-slate-100 hover:text-slate-700">
                    <i class="fa-solid fa-ellipsis"></i>
                </button>
            </div>
        </div>
        <div class="mt-3">
            <p class="whitespace-pre-wrap text-sm leading-relaxed text-foreground">post content</p>
        </div>
    </div>


    <div class="max-h-155 overflow-hidden border-y border-slate-200">
        <button type="button" class="group relative block w-full cursor-zoom-in">
            <img alt="post" class="w-full object-cover" src="images\route.png">
            <span class="pointer-events-none absolute inset-0 bg-black/0 transition group-hover:bg-black/10"></span>
        </button>
    </div>

    <div class="px-4 pb-2 pt-3 text-sm text-slate-500">
        <div class="flex flex-wrap items-center justify-between gap-2">
            <div class="flex items-center gap-2">
                <span class="flex h-5 w-5 items-center justify-center rounded-full bg-softBlue text-white">
                    <i class="fa-regular fa-thumbs-up  text-xs"></i>
                </span>
                <button type="button" class="font-semibold transition cursor-default">
                    0 likes
                </button>
            </div>

            <div class="flex flex-wrap items-center gap-2 text-xs sm:gap-3 sm:text-sm">
                <span class="inline-flex items-center gap-1">
                    <i class="fa-solid fa-repeat text-xs"></i>
                    0 shares
                </span>
                <span>0 comments</span>
                <button class="rounded-md px-2 py-1 text-xs font-bold text-softBlue hover:bg-babyBlue cursor-pointer">
                    View details
                </button>
            </div>
        </div>
    </div>

    <div class="mx-4 border-t border-slate-200"></div>
    <div class="grid grid-cols-3 gap-1 p-1">

        <button
            class="cursor-pointer flex items-center justify-center gap-1.5 rounded-md p-2 text-xs font-semibold transition-colors disabled:cursor-not-allowed disabled:opacity-50 sm:gap-2 sm:text-sm text-slate-600 hover:bg-slate-100">
            <i class="fa-regular fa-thumbs-up  text-xl"></i>
            <span>Like</span>
        </button>

        <button
            class="cursor-pointer flex items-center justify-center gap-1.5 rounded-md p-2 text-xs font-semibold transition-colors disabled:cursor-not-allowed disabled:opacity-50 sm:gap-2 sm:text-sm text-slate-600 hover:bg-slate-100">
            <i class="fa-regular fa-comment"></i>
            <span>Comment</span>
        </button>

        <button
            class="cursor-pointer flex items-center justify-center gap-1.5 rounded-md p-2 text-xs font-semibold transition-colors disabled:cursor-not-allowed disabled:opacity-50 sm:gap-2 sm:text-sm text-slate-600 hover:bg-slate-100">
            <i class="fa-solid fa-share"></i>
            <span>Share</span>
        </button>
    </div>
</article>
